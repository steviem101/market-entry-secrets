# MES-148 Phase 1c: golden-set eval — replay frozen intakes through the real
# generate-report pipeline and judge-score every section; fail on a >=1.0 mean
# drop vs eval/baselines.json. See eval/README.md.
#
# Runs on manual dispatch and on PRs touching the report pipeline, templates,
# or the harness itself. Each golden burns one full report of external spend,
# so this is deliberately NOT on every push.
#
# One-time setup: repo secrets EVAL_SUPABASE_URL, EVAL_SUPABASE_ANON_KEY,
# EVAL_SERVICE_ROLE_KEY, EVAL_USER_EMAIL, EVAL_USER_PASSWORD, ANTHROPIC_API_KEY
# (point at a preview/staging env, never prod). Until they exist the runner
# prints SKIPPED and exits 0.

name: Golden Eval

on:
  workflow_dispatch:
    inputs:
      goldens:
        description: "Comma-separated golden_ids (empty = all)"
        required: false
        default: ""
      money_model:
        description: "Phase 2b A/B: route the 3 money sections to this model id (e.g. claude-sonnet-5). Empty = flash baseline."
        required: false
        default: ""
      update_baseline:
        description: "Re-stamp eval/baselines.json from THIS run and open a PR with the new baseline (reviewed like code). Use the full set (leave goldens empty)."
        required: false
        type: boolean
        default: false
  # PRs run a cheap 2-golden SMOKE subset (see the run step); the full set runs on
  # manual dispatch and nightly. Keeps report-pipeline PRs from burning the whole
  # set (and brushing the 5-reports/60min limit) on every push.
  #
  # Deliberately NOT triggered by `eval/**` or this workflow file: with EVAL_* now
  # pointing at PROD, a PR that modified the runner or this YAML would otherwise run
  # attacker-controlled code with the prod service-role key in env (same-repo PRs
  # DO receive Actions secrets) and could exfiltrate it. Runner/workflow changes are
  # validated on manual dispatch + the nightly run instead; the report-pipeline PRs
  # below still smoke-test with the trusted, committed runner.
  pull_request:
    paths:
      - "supabase/functions/generate-report/**"
      - "supabase/functions/_shared/**"
      - "supabase/migrations/*report_template*"
  # Nightly full run (~02:00 AEST). The eval user is rate-limit-exempt via
  # EVAL_BYPASS_USER_ID so the whole set completes in one pass.
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: golden-eval-${{ github.ref }}
  cancel-in-progress: false # a run in flight has already spent research money — let it finish

jobs:
  golden-eval:
    runs-on: ubuntu-latest
    # contents/pull-requests write are used ONLY by the final baseline-refresh
    # step (open a PR with the new eval/baselines.json). The eval run itself needs
    # neither; the step that commits never has the EVAL_* prod secrets in scope.
    permissions:
      contents: write
      pull-requests: write
    # Full set runs sequentially at up to ~12 min/golden; 150 holds ~10-12 goldens.
    # Beyond that, shard eval users / parallelise rather than only raising this.
    timeout-minutes: 150
    steps:
      # persist-credentials:false keeps the write-capable GITHUB_TOKEN OUT of
      # .git/config during the prod-secret-bearing eval run (which resolves
      # unpinned esm.sh deps); the baseline-refresh step below re-authenticates
      # explicitly with the token only for its own push (mes-qa hardening).
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run golden set
        env:
          EVAL_SUPABASE_URL: ${{ secrets.EVAL_SUPABASE_URL }}
          EVAL_SUPABASE_ANON_KEY: ${{ secrets.EVAL_SUPABASE_ANON_KEY }}
          EVAL_SERVICE_ROLE_KEY: ${{ secrets.EVAL_SERVICE_ROLE_KEY }}
          EVAL_USER_EMAIL: ${{ secrets.EVAL_USER_EMAIL }}
          EVAL_USER_PASSWORD: ${{ secrets.EVAL_USER_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LABEL: ${{ github.event.pull_request.head.sha || github.sha }}
          # Pass the dispatch input through the environment — NEVER interpolate
          # ${{ github.event.inputs.* }} into the run script: with the secrets
          # above in scope that is a GitHub Actions script-injection / secret-
          # exfiltration vector.
          GOLDENS_INPUT: ${{ github.event.inputs.goldens }}
          # Phase 2b money-section A/B model id — read directly by the runner (which
          # charset-guards it), passed via env (never interpolated into the script).
          MONEY_MODEL: ${{ github.event.inputs.money_model }}
          # Boolean dispatch input, passed via env (never interpolated into the
          # script — same secret-exfil guard as GOLDENS_INPUT above).
          UPDATE_BASELINE: ${{ github.event.inputs.update_baseline }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          ARGS=""
          INPUT="$GOLDENS_INPUT"
          # On PRs (no explicit dispatch input) run a cheap 2-golden smoke subset;
          # manual dispatch without an input and the nightly schedule run the full set.
          if [ "$EVENT_NAME" = "pull_request" ] && [ -z "$INPUT" ]; then
            INPUT="floats-au-startup,infact-uk-fintech"
          fi
          if [ -n "$INPUT" ]; then
            # Defence in depth: reject anything outside the golden-id charset.
            case "$INPUT" in
              *[!a-zA-Z0-9,_-]*) echo "Invalid goldens input" >&2; exit 1 ;;
            esac
            ARGS="--goldens=$INPUT"
          fi
          # Re-stamp the committed baseline from this run when explicitly asked
          # (manual dispatch only). Only meaningful on the full set — a subset
          # would re-stamp just those goldens.
          if [ "$UPDATE_BASELINE" = "true" ]; then
            ARGS="$ARGS --update-baseline"
          fi
          # --no-lock: the root deno.lock pins esm.sh hashes for other tooling
          # and drifts as esm.sh re-resolves unpinned deps — the runner is not
          # bound by it.
          deno run --no-lock --allow-net --allow-env --allow-read --allow-write eval/run-goldens.ts $ARGS

      # Open a PR with the refreshed baseline so it is reviewed like code (never
      # committed straight to main). Runs ONLY on an explicit update_baseline
      # dispatch, in a separate step that does NOT carry the EVAL_* prod secrets.
      # github.run_id is a safe numeric — no user input is interpolated here.
      - name: Open baseline-refresh PR
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_baseline == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- eval/baselines.json; then
            echo "Baseline unchanged — nothing to open a PR for."
            exit 0
          fi
          BRANCH="eval/baseline-refresh-${{ github.run_id }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add eval/baselines.json
          git commit -m "chore(eval): refresh golden baseline (run ${{ github.run_id }})"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(eval): refresh golden baseline" \
            --body "Automated golden-baseline refresh from the \`update_baseline\` dispatch (run ${{ github.run_id }}). Review the per-section score deltas in \`eval/baselines.json\` before merging — this re-stamps the regression gate to the current pipeline's scores. See eval/README.md."
