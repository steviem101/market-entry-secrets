# MES-148 Phase 1c: golden-set eval — replay frozen intakes through the real
# generate-report pipeline and judge-score every section; fail on a >=1.0 mean
# drop vs eval/baselines.json. See eval/README.md.
#
# Runs on manual dispatch and on PRs touching the report pipeline, templates,
# or the harness itself. Each golden burns one full report of external spend,
# so this is deliberately NOT on every push.
#
# One-time setup: repo secrets EVAL_SUPABASE_URL, EVAL_SUPABASE_ANON_KEY,
# EVAL_SERVICE_ROLE_KEY, EVAL_USER_EMAIL, EVAL_USER_PASSWORD, ANTHROPIC_API_KEY
# (point at a preview/staging env, never prod). Until they exist the runner
# prints SKIPPED and exits 0.

name: Golden Eval

on:
  workflow_dispatch:
    inputs:
      goldens:
        description: "Comma-separated golden_ids (empty = all)"
        required: false
        default: ""
  # PRs run a cheap 2-golden SMOKE subset (see the run step); the full set runs on
  # manual dispatch and nightly. Keeps report-pipeline PRs from burning the whole
  # set (and brushing the 5-reports/60min limit) on every push.
  #
  # Deliberately NOT triggered by `eval/**` or this workflow file: with EVAL_* now
  # pointing at PROD, a PR that modified the runner or this YAML would otherwise run
  # attacker-controlled code with the prod service-role key in env (same-repo PRs
  # DO receive Actions secrets) and could exfiltrate it. Runner/workflow changes are
  # validated on manual dispatch + the nightly run instead; the report-pipeline PRs
  # below still smoke-test with the trusted, committed runner.
  pull_request:
    paths:
      - "supabase/functions/generate-report/**"
      - "supabase/functions/_shared/**"
      - "supabase/migrations/*report_template*"
  # Nightly full run (~02:00 AEST). The eval user is rate-limit-exempt via
  # EVAL_BYPASS_USER_ID so the whole set completes in one pass.
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: golden-eval-${{ github.ref }}
  cancel-in-progress: false # a run in flight has already spent research money — let it finish

jobs:
  golden-eval:
    runs-on: ubuntu-latest
    # Full set runs sequentially at up to ~12 min/golden; 150 holds ~10-12 goldens.
    # Beyond that, shard eval users / parallelise rather than only raising this.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run golden set
        env:
          EVAL_SUPABASE_URL: ${{ secrets.EVAL_SUPABASE_URL }}
          EVAL_SUPABASE_ANON_KEY: ${{ secrets.EVAL_SUPABASE_ANON_KEY }}
          EVAL_SERVICE_ROLE_KEY: ${{ secrets.EVAL_SERVICE_ROLE_KEY }}
          EVAL_USER_EMAIL: ${{ secrets.EVAL_USER_EMAIL }}
          EVAL_USER_PASSWORD: ${{ secrets.EVAL_USER_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LABEL: ${{ github.event.pull_request.head.sha || github.sha }}
          # Pass the dispatch input through the environment — NEVER interpolate
          # ${{ github.event.inputs.* }} into the run script: with the secrets
          # above in scope that is a GitHub Actions script-injection / secret-
          # exfiltration vector.
          GOLDENS_INPUT: ${{ github.event.inputs.goldens }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          ARGS=""
          INPUT="$GOLDENS_INPUT"
          # On PRs (no explicit dispatch input) run a cheap 2-golden smoke subset;
          # manual dispatch without an input and the nightly schedule run the full set.
          if [ "$EVENT_NAME" = "pull_request" ] && [ -z "$INPUT" ]; then
            INPUT="floats-au-startup,infact-uk-fintech"
          fi
          if [ -n "$INPUT" ]; then
            # Defence in depth: reject anything outside the golden-id charset.
            case "$INPUT" in
              *[!a-zA-Z0-9,_-]*) echo "Invalid goldens input" >&2; exit 1 ;;
            esac
            ARGS="--goldens=$INPUT"
          fi
          # --no-lock: the root deno.lock pins esm.sh hashes for other tooling
          # and drifts as esm.sh re-resolves unpinned deps — the runner is not
          # bound by it.
          deno run --no-lock --allow-net --allow-env --allow-read --allow-write eval/run-goldens.ts $ARGS
