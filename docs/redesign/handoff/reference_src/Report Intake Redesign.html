<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report Intake — Redesign v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#102A43',
          body: '#41566B',
          muted: '#7387A0',
          line: '#E6EDF3',
          canvas: '#F5F8FB',
          primary: { DEFAULT: 'rgb(var(--primary-rgb) / <alpha-value>)', 700: 'rgb(var(--primary-700-rgb) / <alpha-value>)' },
          sky: { soft: 'rgb(var(--sky-soft-rgb) / <alpha-value>)', tint: 'rgb(var(--sky-tint-rgb) / <alpha-value>)' },
        },
        fontFamily: { sans: ['var(--app-font)', 'system-ui', 'sans-serif'] },
        boxShadow: {
          card: '0 1px 2px rgba(16,42,67,0.04), 0 10px 26px rgba(16,42,67,0.06)',
          pop: '0 18px 50px rgba(16,42,67,0.16)',
        },
      },
    },
  };
</script>
<style>
  :root {
    --tw-primary: #1AA3E0;
    --primary: #1AA3E0; --primary-rgb: 26 163 224;
    --primary-700: #0F6FA0; --primary-700-rgb: 15 111 160;
    --sky-soft-rgb: 230 244 252;
    --sky-tint-rgb: 243 250 254;
    --app-font: 'Plus Jakarta Sans';
  }
  * { font-family: var(--app-font), system-ui, sans-serif; }
  body { background: #E9EEF3; margin: 0; }
  .btn-primary {
    background-image: linear-gradient(180deg, color-mix(in srgb, var(--primary) 80%, #fff) 0%, var(--primary) 58%, var(--primary-700) 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 6px 16px color-mix(in srgb, var(--primary) 32%, transparent);
  }
  /* Tweak-driven card style + density overrides */
  .card-outline .rc-card { box-shadow: none !important; }
  .card-elevated .rc-card { box-shadow: 0 18px 50px rgba(16,42,67,0.16) !important; }
  .app-compact .rc-card { padding: 1.1rem !important; }
  .app-compact .rc-shell { padding-top: 1.5rem !important; padding-bottom: 1.5rem !important; }
  .btn-primary:hover { filter: brightness(1.04); }
  .btn-primary:active { filter: brightness(0.97); }
  .rc-surface { background: #F5F8FB; }
  /* slim scrollbars inside the mobile frame */
  .rc-surface ::-webkit-scrollbar { width: 8px; height: 8px; }
  .rc-surface ::-webkit-scrollbar-thumb { background: rgba(16,42,67,0.14); border-radius: 8px; }
  select { background-image: none; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <rect width="48" height="48" rx="10" fill="#1AA3E0"/>
    <circle cx="24" cy="24" r="13" fill="none" stroke="#fff" stroke-width="2.6"/>
    <path d="M24 15l-3 9 9-3z" fill="#fff"/>
    <path d="M24 33l3-9-9 3z" fill="#BBE6F8"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="rc-data.jsx"></script>
<script type="text/babel" src="rc-ui.jsx"></script>
<script type="text/babel" src="rc-persona.jsx"></script>
<script type="text/babel" src="rc-step1.jsx"></script>
<script type="text/babel" src="rc-step2.jsx"></script>
<script type="text/babel" src="rc-review.jsx"></script>
<script type="text/babel" src="rc-auth-progress.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rc-flow.jsx"></script>
</body>
</html>
