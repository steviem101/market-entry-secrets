[functions.scrape-company]
# Step 1 website prefill runs BEFORE auth, so JWT is not required. The function
# guards itself: SSRF check (isPrivateOrReservedUrl) + per-caller rate limiting.
verify_jwt = false

[functions.email-assets]
# Public, cacheable host for transactional-email images (brand logo). Serves a
# static asset with no user input; must be publicly fetchable by mail clients.
verify_jwt = false

[functions.slack-notify]
# Invoked server-to-server by the dispatch_activity_event() DB trigger, which sends
# only an `x-webhook-secret` header (no JWT). The function authenticates that secret
# in-code against SLACK_NOTIFY_WEBHOOK_SECRET. With verify_jwt = true the API gateway
# rejects the trigger's POST (UNAUTHORIZED_NO_AUTH_HEADER) before the function runs,
# so report-quality cards silently never post — keep this false.
verify_jwt = false

[functions.report-quality-rollup]
# Cron-invoked weekly rollup; authenticated in-code by x-webhook-secret ==
# SLACK_NOTIFY_WEBHOOK_SECRET (same pattern as slack-notify). Must stay false or the
# gateway rejects the cron POST before the function runs.
verify_jwt = false

[functions.report-quality-loop]
# Cron-invoked, propose-only report-quality review loop; authenticated in-code by
# x-webhook-secret == SLACK_NOTIFY_WEBHOOK_SECRET (same pattern as report-quality-rollup).
# Must stay false or the gateway rejects the cron POST (no JWT) before the function runs.
# Disabled by default — self-gates on activity_event_routing 'report.quality.loop'.
verify_jwt = false

[functions.rq-slack-actions]
# Slack interactivity receiver for the report-quality review queue (Accept/Reject
# buttons on #report-quality digests). Authenticated in-code by Slack request signing
# (SLACK_SIGNING_SECRET) — Slack sends no JWT, so this must stay false or the gateway
# rejects the interaction POST before the function runs.
verify_jwt = false

[functions.kb-sync]
# Cron-invoked (kb-sync-incremental) + one-off backfill; authenticated in-code by
# x-internal-secret == KB_SYNC_SECRET (same pattern as process-email-queue). Must
# stay false or the gateway rejects the cron POST (no JWT) before the function runs.
verify_jwt = false
