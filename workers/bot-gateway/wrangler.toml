# MES bot-gateway (MES-83 Phase 2). Deploy: see README.md in this directory.
name = "mes-bot-gateway"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Staging: `wrangler deploy` publishes to <name>.<subdomain>.workers.dev for
# testing BEFORE any production traffic is touched (ORIGIN_HOST below makes
# the staging Worker proxy the real site instead of recursing).
workers_dev = true

# PRODUCTION ROUTES — live since 2026-07-10 (staging checklist passed on
# https://mes-bot-gateway.mes-stevie.workers.dev). Removing these routes in
# the Cloudflare dashboard is the instant kill switch (see README.md).
routes = [
  { pattern = "marketentrysecrets.com/*", zone_name = "marketentrysecrets.com" },
  { pattern = "www.marketentrysecrets.com/*", zone_name = "marketentrysecrets.com" },
]

[vars]
# Kill switch for the rendering branch only — the www-301 / sitemap proxy /
# X-Robots-Tag fixes keep working when this is "false".
RENDERING_ENABLED = "true"
# Upstream = the Lovable project host. The public domain must be RELEASED in
# Lovable's settings (Lovable's Cloudflare-for-SaaS custom-hostname claim
# takes priority over this zone's Workers — see README "Architecture").
ORIGIN_HOST = "market-entry-secrets.lovable.app"
PUBLIC_HOST = "marketentrysecrets.com"
SITEMAP_FUNCTION_URL = "https://xhziwveaiuhzdoutpgrh.supabase.co/functions/v1/sitemap"

# SECRET (never in this file): the Prerender.io token.
#   npx wrangler secret put PRERENDER_TOKEN
